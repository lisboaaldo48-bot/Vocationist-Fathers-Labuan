<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vocationist Fathers Indonesia</title>

<meta name="google-site-verification" content="SYWpjJZpAjfjKeR5cD9Im3ZCYSQIvZA529Z_JPHeJBc" />

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
}

/* HEADER */
.header {
  background:#1e3a8a;
  color:white;
  text-align:center;
  padding:20px;
}

.header img {
  width:80px;
}

/* NAVBAR */
.navbar {
  display:flex;
  justify-content:center;
  background:#f7941d;
}

.navbar a {
  padding:14px 20px;
  text-decoration:none;
  color:white;
  font-weight:bold;
}

.navbar a:hover {
  background:#d97706;
}

/* BANNER */
.banner img {
  width:100%;
  height:400px;
  object-fit:cover;
}

/* CONTENT */
.container {
  padding:20px;
}

.card {
  background:white;
  padding:20px;
  margin:15px 0;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

/* FORM */
input, textarea {
  width:100%;
  padding:10px;
  margin:5px 0 15px;
  border-radius:5px;
  border:1px solid #ccc;
}

button {
  background:#1e3a8a;
  color:white;
  padding:10px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

button:hover {
  background:#2563eb;
}

/* FOOTER */
.footer {
  background:#1e3a8a;
  color:white;
  text-align:center;
  padding:15px;
}
</style>

<script>
function kirimWA() {
  var nama = document.getElementById('nama').value;
  var ttl = document.getElementById('ttl').value;
  var alamat = document.getElementById('alamat').value;
  var hp = document.getElementById('hp').value;
  var email = document.getElementById('email').value;
  var pendidikan = document.getElementById('pendidikan').value;
  var motivasi = document.getElementById('motivasi').value;

  var nomor = "6281339867238";

  var pesan = "PENDAFTARAN VOCATIONIST\n\n"
    + "Nama: " + nama + "\n"
    + "TTL: " + ttl + "\n"
    + "Alamat: " + alamat + "\n"
    + "HP: " + hp + "\n"
    + "Email: " + email + "\n"
    + "Pendidikan: " + pendidikan + "\n"
    + "Motivasi: " + motivasi;

  var url = "https://wa.me/" + nomor + "?text=" + encodeURIComponent(pesan);
  window.open(url, '_blank');
}
</script>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <img src="sdv.png">
  <h2>Vocationist Fathers Indonesia</h2>
  <p>Panggilan untuk melayani Tuhan</p>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <a href="#">Beranda</a>
  <a href="#">Tentang</a>
  <a href="#">Pendaftaran</a>
</div>

<!-- BANNER -->
<div class="banner">
  <img src="vocationist.png">
</div>

<!-- CONTENT -->
<div class="container">

  <div class="card">
    <h3>Tentang Kami</h3>
    <p>Vocationist Fathers adalah komunitas religius yang melayani panggilan hidup imamat dan bakti demi kemuliaan Tuhan.</p>
  </div>

  <div class="card">
    <h3>Formulir Pendaftaran</h3>

    <input type="text" id="nama" placeholder="Nama Lengkap">
    <input type="text" id="ttl" placeholder="Tempat/Tanggal Lahir">
    <input type="text" id="alamat" placeholder="Alamat">
    <input type="text" id="hp" placeholder="Nomor HP">
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="pendidikan" placeholder="Pendidikan Terakhir">
    <textarea id="motivasi" placeholder="Motivasi"></textarea>

    <button onclick="kirimWA()">Kirim ke WhatsApp</button>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  © 2026 Vocationist Fathers Indonesia
</div>

</body>
</html>
